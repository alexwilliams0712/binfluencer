name: Binfluencer
options:
  bundleIdPrefix: com.alexwilliams
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: PJKF44SS8H
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  Binfluencer:
    type: application
    platform: iOS
    sources:
      - Binfluencer
      - Shared
    attributes:
      ProvisioningStyle: Automatic
      DevelopmentTeam: PJKF44SS8H
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexwilliams.Binfluencer
        DEVELOPMENT_TEAM: PJKF44SS8H
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_CFBundleDisplayName: Binfluencer
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_ENTITLEMENTS: Binfluencer/Binfluencer.entitlements
    dependencies:
      - target: BinWidgetExtension

  BinWidgetExtension:
    type: app-extension
    platform: iOS
    product: BinWidgetExtension
    sources:
      - path: BinWidget
        excludes:
          - Info.plist
      - Shared
    attributes:
      ProvisioningStyle: Automatic
      DevelopmentTeam: PJKF44SS8H
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexwilliams.Binfluencer.BinWidget
        DEVELOPMENT_TEAM: PJKF44SS8H
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: BinWidget/Info.plist
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_CFBundleDisplayName: Binfluencer Widget
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_ENTITLEMENTS: BinWidget/BinWidgetExtension.entitlements

  BinfluencerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BinfluencerTests
    dependencies:
      - target: Binfluencer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexwilliams.BinfluencerTests
        DEVELOPMENT_TEAM: PJKF44SS8H
        GENERATE_INFOPLIST_FILE: true

schemes:
  Binfluencer:
    build:
      targets:
        Binfluencer: all
        BinWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BinfluencerTests
    archive:
      config: Release
